<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>
  
  <main class="card">
    <object data="assets/images/illustration-article.svg" type="image/svg+xml" class="img_container">
      <img src="assets/images/illustration-article.svg" alt="contenet picture" class="card_image">
    </object>

    <button type="button" class="progress_btn">Learning</button> 

    <p class="date">Published 21 Dec 2023</p>

    <h3 class="card_title">HTML & CSS foundations</h3>

    <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
  <div class="user_info_container">
    <img src="assets/images/image-avatar.webp" alt="Profile_icon" class="pfp_icon">
    <p class="name">Greg Hooper </p>
  </div>
  </main>

  <footer class="attribution">
    <p class="To:FEM">Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.</p> 
    <p class="From:diser">Coded by <a href="https://github.com/Diser-Xian/MISSLE_Project001">Diser-Xian  Github</a>.</p>
  </footer>
</body>
</html>
